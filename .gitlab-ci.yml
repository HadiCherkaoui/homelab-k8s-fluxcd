stages:
  - security
  - maintenance
variables:
  GIT_STRATEGY: fetch
helm_chart_bump:
  stage: maintenance
  image: alpine:3.20
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  before_script:
    - apk add --no-cache bash git curl tar
    # Install yq (mikefarah v4)

    - |
      YQ_VER=v4.44.3
      curl -sSL -o /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VER}/yq_linux_amd64"
      chmod +x /usr/local/bin/yq
    # Install crane (static binary)

    - |
      CRANE_VER=v0.20.6
      ARCH=x86_64
      URL="https://github.com/google/go-containerregistry/releases/download/${CRANE_VER}/go-containerregistry_Linux_${ARCH}.tar.gz"
      echo "Downloading crane from ${URL}"
      curl -sSL -o /tmp/crane.tgz "$URL"
      tar -C /usr/local/bin -xzf /tmp/crane.tgz crane
      chmod +x /usr/local/bin/crane
      crane version || true
    # Configure git to push with CI job token

    - git config user.name "helm-bump-bot"
    - git config user.email "helm-bump-bot@example.com"
    - git remote set-url origin "https://token:${DEPLOY_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    # Chart discovery + bump + the semver guardrail all live in the script,
    # which now exempts local path charts (e.g. filebrowser's chart: ./filebrowser).
    - bash scripts/update_helm_charts.sh

# --- Added 2026-06-08 after the SOPS age-key leak incident ---
# Scans the whole repo + history for secrets on every push and MR; blocks on findings.
# Mirrors the local pre-commit hook (same .gitleaks.toml), so it also covers anyone
# who hasn't run `pre-commit install`. Server-side `prevent_secrets` push rule is the
# last line (rejects the push before it even lands).
secret_detection:
  stage: security
  image:
    name: ghcr.io/gitleaks/gitleaks:v8.30.1
    entrypoint: [""]
  variables:
    GIT_DEPTH: "0"  # full history, not a shallow clone, so every commit is scanned
  script:
    - gitleaks detect --source . --redact -v --exit-code 1
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
