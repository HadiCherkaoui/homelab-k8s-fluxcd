# Custom ruleset for GitLab Secret Detection — adds an age/SOPS private-key rule
# (GitLab's managed ruleset doesn't include one). Passthrough replaces the
# analyzer's gitleaks config with this one, which extends the defaults + adds age.
# Whether GitLab Secret PUSH Protection (real-time) honours this depends on the
# GitLab version — verify by pushing a test age key after this lands on main.
[secrets]
  [[secrets.passthrough]]
    type   = "raw"
    target = "gitleaks.toml"
    value  = """
title = "homelab-k8s-fluxcd custom secret-detection"

[extend]
useDefault = true

[[rules]]
id = "age-secret-key"
description = "age / SOPS private key"
regex = '''AGE-SECRET-KEY-1[0-9A-Z]{58}'''
keywords = ["AGE-SECRET-KEY"]
"""
