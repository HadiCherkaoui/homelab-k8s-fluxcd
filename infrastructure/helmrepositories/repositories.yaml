# Anvil chart, published as an OCI artifact by the project's GitLab CI
# (`helm-publish` job → registry.cherkaoui.ch/hadicherkaoui/anvil/anvil:<ver>).
# The container registry hostname (registry.cherkaoui.ch) is separate from
# the GitLab UI (gitlab.cherkaoui.ch); using the UI host returns an HTML
# sign-in page instead of OCI tags. Project is public — no auth needed.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: anvil
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://registry.cherkaoui.ch/hadicherkaoui/anvil
