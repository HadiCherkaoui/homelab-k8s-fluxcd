---
# Anvil chart, published as an OCI artifact by the project's GitLab CI
# (`helm-publish` job → registry.cherkaoui.ch/hadicherkaoui/anvil/anvil:<ver>).
# The container registry hostname (registry.cherkaoui.ch) is separate from
# the GitLab UI (gitlab.cherkaoui.ch); using the UI host returns an HTML
# sign-in page instead of OCI tags. Project is public — no auth needed.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: anvil
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://registry.cherkaoui.ch/hadicherkaoui/anvil
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: filebrowser-chart
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/Softwaredam/filebrowser-chart
  ref:
    tag: "1.3.1-stable"
---
# Lockbox server chart, published as an OCI artifact by the project's
# GitLab CI (helm-publish job → registry.cherkaoui.ch/hadicherkaoui/lockbox/lockbox:<ver>).
# Project is public — no auth needed.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: lockbox
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://registry.cherkaoui.ch/hadicherkaoui/lockbox
---
# Lockbox Kubernetes controller chart. Same publish pattern as the
# server above: GitLab CI's helm-publish job pushes to the project's
# container registry at registry.cherkaoui.ch/hadicherkaoui/lockbox-k8s-controller.
# Project is public — no auth needed.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: lockbox-k8s-controller
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://registry.cherkaoui.ch/hadicherkaoui/lockbox-k8s-controller
---
# Atelier (fal.ai media studio) chart, published as an OCI artifact by the
# project's GitLab CI (helm-publish → registry.cherkaoui.ch/hadicherkaoui/fal-ai-ui/atelier:<ver>).
# Container registry host (registry.cherkaoui.ch) ≠ GitLab UI (gitlab.cherkaoui.ch).
# Project is public — no auth needed.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: atelier
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://registry.cherkaoui.ch/hadicherkaoui/fal-ai-ui
