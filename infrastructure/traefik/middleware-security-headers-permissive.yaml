apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers-permissive
  namespace: traefik
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    stsSeconds: 63072000
    stsIncludeSubdomains: true
    stsPreload: true
    referrerPolicy: "no-referrer-when-downgrade"
    contentSecurityPolicy: "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:; font-src * data:; connect-src *; media-src * blob: data:; worker-src 'self' blob:; frame-ancestors 'self'; object-src 'none'; base-uri 'self'"
    permissionsPolicy: "geolocation=(), microphone=(), camera=(), fullscreen=()"
