apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: metrics-server
spec:
  interval: 10m
  chart:
    spec:
      chart: metrics-server
      version: 3.13.0
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: flux-system
  install:
    createNamespace: false
  values:
    # k0s ships kubelets with self-signed serving certs that aren't part of
    # the cluster CA, so the metrics-server's TLS verification fails out of
    # the box. The homelab is single-node + internal-only, so accepting the
    # kubelet's cert without verification is the standard trade-off.
    args:
      - --kubelet-insecure-tls
