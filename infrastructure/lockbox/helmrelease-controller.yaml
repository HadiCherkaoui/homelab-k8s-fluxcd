apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lockbox-k8s-controller
  namespace: lockbox-system
spec:
  interval: 10m
  chart:
    spec:
      chart: lockbox-k8s-controller
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: lockbox-k8s-controller
        namespace: flux-system
  install:
    createNamespace: false
  upgrade:
    cleanupOnFail: true
  values:
    image:
      repo: registry.cherkaoui.ch/hadicherkaoui/lockbox-k8s-controller
      # `latest` is the only tag CI publishes for the controller image.
      tag: latest
      pullPolicy: Always

    lockbox:
      # SOPS-encrypted Secret defined in secrets/lockbox/lockbox-config.secret.yaml.
      existingSecret: lockbox-config
      # lockbox-credentials already exists (SOPS-managed), so the controller
      # loads the seed and skips the API_KEY register path.
      skipBootstrapCheck: true
      syncInterval: 60s

    leaderElection:
      enabled: true

    metrics:
      enabled: false

    rbac:
      create: true
