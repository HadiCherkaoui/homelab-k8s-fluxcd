apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lockbox
  namespace: lockbox-system
spec:
  interval: 10m
  chart:
    spec:
      chart: lockbox
      version: "0.1.0-0df3cdfc"
      sourceRef:
        kind: HelmRepository
        name: lockbox
        namespace: flux-system
  install:
    createNamespace: false
  upgrade:
    cleanupOnFail: true
  values:
    image:
      repo: registry.cherkaoui.ch/hadicherkaoui/lockbox
      # Server build b57c232 — adds the secret_type field end-to-end
      # (proto/store/server/CLI) and --from-file to lbx.  The chart pin
      # at 0.1.0-0df3cdfc is intentional: this image is API-compatible
      # with that chart's deployment shape, and CI didn't republish the
      # chart because deploy/ wasn't touched by b57c232.
      tag: "b57c2321e16f4598e0c26623cc79138e98797e9c"
      pullPolicy: IfNotPresent

    auth:
      # SOPS-encrypted Secret defined in secrets/lockbox/lockbox-auth.secret.yaml.
      existingSecret: lockbox-auth

    persistence:
      enabled: true
      size: 1Gi
      # `fast` is the SC used by scolx CNPG — RWO, low-latency, matches
      # SQLite's request profile.
      storageClassName: fast

    ingress:
      enabled: true
      entryPoint: websecure
      host: lockbox.cherkaoui.ch
      middlewares:
        - name: security-headers
          namespace: traefik
      tls:
        enabled: true
        certResolver: letsencrypt
