# Local commit-time guard rails. One-time setup per clone:
#     pipx install pre-commit     # or: pip install --user pre-commit / brew install pre-commit
#     pre-commit install
# After that, `git commit` runs these automatically and blocks on failure.
# First line of defence; the GitLab CI secret_detection job + server-side push
# rule back it up for anyone who hasn't run `pre-commit install`.
# Keep revs current with: pre-commit autoupdate

repos:
  # Secret scanning — catches the 2026-06-08 leak class (age private keys) and more.
  # Uses .gitleaks.toml in repo root for rules + allowlist.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Cheap hygiene checks.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key            # any PEM/SSH/EC private key block
      - id: check-added-large-files       # stop accidental blobs
        args: ["--maxkb=2048"]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Repo-specific: anything under secrets/ MUST be SOPS-encrypted.
  - repo: local
    hooks:
      - id: secrets-must-be-sops-encrypted
        name: secrets/ files must be SOPS-encrypted
        language: system
        files: '^secrets/.*\.(ya?ml)$'
        exclude: '(kustomization\.ya?ml$|/namespace\.ya?ml$)'
        entry: scripts/check-sops-encrypted.sh
