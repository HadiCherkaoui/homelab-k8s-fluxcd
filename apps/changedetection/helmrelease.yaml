apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: changedetection
  namespace: changedetection
spec:
  interval: 10m
  chart:
    spec:
      chart: changedetection
      version: "0.12.4"
      sourceRef:
        kind: HelmRepository
        name: alekc
        namespace: flux-system
  install:
    createNamespace: false
  values:
    persistence:
      enabled: true
      storageClass: fast
      size: 2Gi
    env:
      simple:
        BASE_URL: "https://changes.cherkaoui.ch"
