apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustfs
  namespace: scolx
spec:
  interval: 10m
  chart:
    spec:
      chart: rustfs
      version: "0.0.85"
      sourceRef:
        kind: HelmRepository
        name: rustfs
        namespace: flux-system
  install:
    createNamespace: false
  values:
    mode:
      standalone:
        enabled: true
      distributed:
        enabled: false
    replicaCount: 1
    secret:
      existingSecret: rustfs-credentials
    config:
      rustfs:
        volumes: "/data"
        address: ":9000"
        console_enable: "false"
        console_address: ":9001"
        log_level: "info"
        region: "eu-central-2"
        obs_log_directory: "/logs"
        obs_environment: "production"
    storageclass:
      name: tank
      dataStorageSize: 1Ti
      logStorageSize: 1Gi
    service:
      type: ClusterIP
      endpoint:
        port: 9000
      console:
        port: 9001
    ingress:
      enabled: false
