apiVersion: v1
kind: ConfigMap
metadata:
  name: scolx-server-config
  namespace: scolx
data:
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8080"
  APP_ENV: "production"
  APP_BASE_URL: "https://scolx.com"
  SIGNUPS_DISABLED: "false"
  MATH_API_BASE_URL: "http://scolx-math:8000"
  OPENAI_CHAT_MODEL: "x-ai/grok-4-fast"
  OPENAI_EMBEDDING_MODEL: "openai/text-embedding-3-small"
  LEPTOS_SITE_ROOT: "/app/site"
  S3_ENDPOINT: "s3.scolx.com"
  S3_REGION: "eu-central-2"
  S3_BUCKET: "scolx"
  S3_USE_SSL: "true"
