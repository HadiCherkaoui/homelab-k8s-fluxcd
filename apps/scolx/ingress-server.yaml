apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: scolx-server
  namespace: scolx
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`scolx.com`) && (Path(`/startupz`) || Path(`/livez`) || Path(`/readyz`) || Path(`/metrics`))
      kind: Rule
      priority: 100
      middlewares:
        - name: internal-only
          namespace: scolx
      services:
        - name: scolx-server
          port: web
    - match: Host(`scolx.com`) && PathPrefix(`/`)
      kind: Rule
      middlewares:
        - name: security-headers
          namespace: traefik
      services:
        - name: scolx-server
          port: web
  tls:
    certResolver: letsencrypt
