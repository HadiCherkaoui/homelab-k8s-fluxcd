apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nextcloud-postgres-cluster
  namespace: nextcloud
  labels:
    app: nextcloud-postgres-cluster
spec:
  instances: 2
  enableSuperuserAccess: false
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  storage:
    storageClass: fast
    size: 10Gi
