apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 10m
  chart:
    spec:
      chart: nextcloud
      version: "9.0.3"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
  install:
    createNamespace: false
  values:
    nextcloud:
      host: cloud.cherkaoui.ch
      existingSecret:
        enabled: true
        secretName: nextcloud-admin
        usernameKey: admin-username
        passwordKey: admin-password
      objectStore:
        s3:
          enabled: true
          host: rustfs-svc
          ssl: false
          port: 9000
          region: eu-central-2
          bucket: nextcloud
          usePathStyle: true
      extraEnv:
        - name: NEXTCLOUD_TRUSTED_PROXIES
          value: "10.0.0.0/8"
        - name: OVERWRITEPROTOCOL
          value: "https"
        - name: OVERWRITECLIURL
          value: "https://cloud.cherkaoui.ch"
        - name: NC_S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: rustfs-credentials
              key: RUSTFS_ACCESS_KEY
        - name: NC_S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: rustfs-credentials
              key: RUSTFS_SECRET_KEY
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: nextcloud-admin
              key: OIDC_CLIENT_ID
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: nextcloud-admin
              key: OIDC_CLIENT_SECRET
      hooks:
        before-starting: |
          php /var/www/html/occ app:list --output=json | grep -q '"oidc_login"' || \
          php /var/www/html/occ app:install oidc_login || true
      defaultConfigs:
        s3.config.php: false
      configs:
        s3.config.php: |-
          <?php
          if (getenv('OBJECTSTORE_S3_BUCKET')) {
            $use_ssl = getenv('OBJECTSTORE_S3_SSL');
            $use_path = getenv('OBJECTSTORE_S3_USEPATH_STYLE');
            $use_legacyauth = getenv('OBJECTSTORE_S3_LEGACYAUTH');
            $autocreate = getenv('OBJECTSTORE_S3_AUTOCREATE');
            $CONFIG = array(
              'objectstore' => array(
                'class' => '\OC\Files\ObjectStore\S3',
                'arguments' => array(
                  'bucket' => getenv('OBJECTSTORE_S3_BUCKET'),
                  'region' => getenv('OBJECTSTORE_S3_REGION') ?: '',
                  'hostname' => getenv('OBJECTSTORE_S3_HOST') ?: '',
                  'port' => getenv('OBJECTSTORE_S3_PORT') ?: '',
                  'storageClass' => getenv('OBJECTSTORE_S3_STORAGE_CLASS') ?: '',
                  'objectPrefix' => getenv('OBJECTSTORE_S3_OBJECT_PREFIX') ?: 'urn:oid:',
                  'autocreate' => strtolower($autocreate) !== 'false',
                  'use_ssl' => strtolower($use_ssl) !== 'false',
                  'use_path_style' => $use_path == true && strtolower($use_path) !== 'false',
                  'legacy_auth' => $use_legacyauth == true && strtolower($use_legacyauth) !== 'false',
                  'key' => getenv('NC_S3_ACCESS_KEY') ?: '',
                  'secret' => getenv('NC_S3_SECRET_KEY') ?: '',
                )
              )
            );
          }
        oidc.config.php: |-
          <?php
          $CONFIG = [
            'oidc_login_provider_url'       => 'https://authentik.cherkaoui.ch/application/o/nextcloud/',
            'oidc_login_client_id'          => getenv('OIDC_CLIENT_ID'),
            'oidc_login_client_secret'      => getenv('OIDC_CLIENT_SECRET'),
            'oidc_login_auto_redirect'      => false,
            'oidc_login_redir_fallback'     => true,
            'oidc_login_end_session_redirect' => false,
            'oidc_login_button_text'        => 'Login with Authentik',
            'oidc_login_hide_password_form' => false,
            'oidc_login_use_id_token'       => true,
            'oidc_login_scope'              => 'openid profile email',
          ];
    internalDatabase:
      enabled: false
    postgresql:
      enabled: false
    mariadb:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      existingSecret:
        enabled: true
        secretName: nextcloud-postgres-cluster-app
        hostKey: host
        usernameKey: user
        passwordKey: password
        databaseKey: dbname
    persistence:
      enabled: true
      storageClass: tank
      size: 10Gi
    ingress:
      enabled: false
