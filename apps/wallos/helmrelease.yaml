apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wallos
  namespace: wallos
spec:
  interval: 10m
  chart:
    spec:
      chart: wallos
      version: "10.6.0"
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    createNamespace: false
  values:
    persistence:
      database:
        enabled: true
        mountPath: "/var/www/html/db"
        storageClass: fast
        size: 1Gi
      logos:
        enabled: true
        mountPath: "/var/www/html/images/uploads/logos"
        storageClass: fast
        size: 1Gi
