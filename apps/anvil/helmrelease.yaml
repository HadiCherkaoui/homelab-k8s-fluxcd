apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: anvil
  namespace: anvil
spec:
  interval: 10m
  chart:
    spec:
      chart: anvil
      version: "1.0.15"
      sourceRef:
        kind: HelmRepository
        name: anvil
        namespace: flux-system
  install:
    createNamespace: false
  upgrade:
    cleanupOnFail: true
  values:
    image:
      # Tag is rolled by GitLab CI's docker-build job (commit SHA + :latest).
      # `latest` + Always means each chart upgrade re-pulls, so a CI image
      # rebuild lands on the next reconcile without bumping this file.
      repo: registry.cherkaoui.ch/hadicherkaoui/anvil
      tag: latest
      pullPolicy: Always
    secrets:
      cfApiKeyExistingSecret: anvil-cf
    # CurseForge feature is active (cfApiKeyExistingSecret set), so the
    # backend requires a snapshots PVC for tar-based modpack backups —
    # startup fails closed otherwise (ANVIL_MODPACK_SNAPSHOTS_PVC unset).
    modpack:
      # Hourly poll cadence for new ServerFiles versions. One HTTPS hit
      # per CF-backed server per tick; CF rate-limits at much higher rates.
      pollIntervalMinutes: 60
      snapshotsPvc:
        enabled: true
        # Immediate-bound SC: WFC + helm --wait deadlocks since the PVC has
        # no chart-side consumer (only runtime backup/restore Jobs mount it).
        storageClass: tank-immediate
        size: 100Gi
    mcNamespace: mc
    # mcDefaults.storageClassName is REQUIRED — the chart fails to render
    # without it. `tank` is the cluster default-marked SC (zfs.csi.openebs.io)
    # per docs/cluster-profile.md in the anvil repo.
    mcDefaults:
      storageClassName: tank
      serviceType: LoadBalancer
      # IP of the cluster node (single-node k0s on homelab). Used by the
      # panel to display NodePort server addresses (host:nodePort) when a
      # user picks NodePort exposure.
      nodeHost: 172.26.20.250
      # Cilium LB-IPAM is configured on this cluster (see cluster-profile.md),
      # so LoadBalancer Services actually get external IPs.
      loadbalancerSupported: true
      # Alpine image — used by the per-server file-browser helper Pod and
      # the modpack mod-sync Job. Both mount per-server data, so pin by
      # digest in production. Restated here so an operator can audit the
      # tag without grepping the chart.
      alpineImage: "alpine:3.20"
      # TZ env stamped onto every managed MC pod. Override of the chart
      # default (Etc/UTC) to keep log timestamps in local time — matches
      # the literal that was hardcoded before chart 1.0.11.
      timezone: "Europe/Zurich"
      # Image for every managed MC StatefulSet (vanilla, modded, modrinth,
      # paper, curseforge). Restated here so an operator can audit the
      # tag without grepping the chart.
      itzgImage: "itzg/minecraft-server:java25"
      # Image for backup, restore, and snapshot-cleanup Jobs. Restated
      # for the same reason.
      busyboxImage: "busybox:1.36"
    persistence:
      enabled: true
      storageClassName: fast
      size: 1Gi
    # Panel pod budget. Homelab is overprovisioned; bump the limit if the
    # capabilities endpoint or modpack poller hits the ceiling.
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    rbac:
      create: true
      # Empty -> chart auto-generates a SA named after the release.
      serviceAccountName: ""
    ingress:
      enabled: true
      entryPoint: websecure
      host: anvil.cherkaoui.ch
      middlewares:
        - name: security-headers
          namespace: traefik
      tls:
        enabled: true
        certResolver: letsencrypt
    # Authentik OIDC. clientSecret + sessionKey live in the SOPS-encrypted
    # `anvil-oidc` Secret (referenced by `existingSecret`). The redirectUrl
    # must match the Redirect URIs field in the Authentik provider exactly.
    oidc:
      enabled: true
      issuerUrl: "https://authentik.cherkaoui.ch/application/o/anvil/"
      clientId: "8JPIVp0vfqq3M0GloOkymTnJfrsYxq37gSgt02Oi"
      redirectUrl: "https://anvil.cherkaoui.ch/api/auth/callback"
      # Comma-separated Authentik subject UUIDs. Empty = any user the
      # Authentik application is bound to is allowed in.
      allowedSubs: ""
      existingSecret: anvil-oidc
    logLevel: info
