apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-valkey
  namespace: gitlab
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/part-of: gitlab
spec:
  replicas: 1
  strategy:
    type: Recreate          # single RWO volume
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
        app.kubernetes.io/part-of: gitlab
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: valkey
          image: valkey/valkey:7.2-alpine
          command: ["sh", "-c"]
          args:
            - exec valkey-server --requirepass "$VALKEY_PASSWORD" --appendonly yes --dir /data --maxmemory-policy noeviction
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitlab-valkey-secret
                  key: password
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: valkey-data
