apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab
  namespace: gitlab
spec:
  interval: 10m
  chart:
    spec:
      chart: gitlab
      version: 9.11.3
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: flux-system
  install:
    createNamespace: false
  values:
    global:
      kas:
        enabled: false
      minio:
        enabled: false
      gitaly:
        enabled: true
      appConfig:
        omniauth:
          enabled: true
          allowSingleSignOn:
            - openid_connect
          blockAutoCreatedUsers: false
          autoLinkUser:
            - openid_connect
          providers:
            - secret: gitlab-authentik
              key: provider
        usagePing:
          enabled: false
        object_store:
          enabled: true
          proxy_download: true
          connection:
            secret: gitlab-rails-storage
            key: connection
        artifacts:
          bucket: gitlab-artifacts
        lfs:
          bucket: git-lfs
        uploads:
          bucket: gitlab-uploads
        packages:
          bucket: gitlab-packages
        externalDiffs:
          bucket: gitlab-mr-diffs
        terraformState:
          bucket: gitlab-terraform-state
        ciSecureFiles:
          bucket: gitlab-ci-secure-files
        dependencyProxy:
          bucket: gitlab-dependency-proxy
        backups:
          bucket: gitlab-backups
          tmpBucket: tmp
      registry:
        bucket: registry
      edition: ee
      hosts:
        domain: cherkaoui.ch
        https: true
        gitlab:
          name: gitlab.cherkaoui.ch
          https: true
        registry:
          name: registry.cherkaoui.ch
          https: true
        minio:
          name: minio.cherkaoui.ch
          https: true
        ssh: "gitlab.cherkaoui.ch"
      ingress:
        enabled: false
        configureCertmanager: false
        tls:
          enabled: false
      smtp:
        enabled: true
        address: smtp.protonmail.ch
        port: 587
        password:
          secret: gitlab-smtp
          key: password
        domain: smtp.protonmail.ch
        authentication: plain
        starttls_auto: true
        openssl_verify_mode: none
      email:
        display_name: Cherkaoui Gitlab
        subject_suffix: ""
      monitoring:
        enabled: true
    gitlab:
      toolbox:
        backups:
          objectStorage:
            backend: s3
            config:
              secret: gitlab-s3cfg
              key: config
      migrations:
        resources:
          requests: {}
      webservice:
        minReplicas: 1
        maxReplicas: 1
        autoscaling:
          enabled: true
      sidekiq:
        minReplicas: 1
        maxReplicas: 1
        autoscaling:
          enabled: true
      gitlab-shell:
        minReplicas: 1
      registry:
        minReplicas: 1
      # Gitaly - fast storage for Git repositories
      gitaly:
        persistence:
          storageClass: fast
          size: 50Gi
    registry:
      storage:
        secret: registry-storage
        key: config
    gitlab-runner:
      runners:
        cache:
          cacheType: s3
          cachePath: "gitlab_runner"
          cacheShared: true
          s3ServerAddress: rustfs.gitlab.svc.cluster.local:9000
          s3BucketName: runner-cache
          s3BucketLocation: us-east-1
          s3CacheInsecure: true
          secretName: rustfs-cache-credentials
    installCertmanager: false
    nginx-ingress:
      enabled: false
    prometheus:
      install: false
    postgresql:
      primary:
        persistence:
          storageClass: fast
          size: 20Gi
    redis:
      master:
        persistence:
          storageClass: fast
          size: 8Gi
    minio:
      persistence:
        storageClass: tank
        size: 50Gi
    extraVolumes: |
      - name: license-key
        configMap:
          name: gitlab-license-key
    extraVolumeMounts: |
      - name: license-key
        readOnly: true
        mountPath: /srv/gitlab/.license_encryption_key.pub
        subPath: .license_encryption_key.pub
  valuesFrom:
    - kind: Secret
      name: gitlab-smtp
      valuesKey: username
      targetPath: global.smtp.user_name
      optional: true
    - kind: Secret
      name: gitlab-smtp
      valuesKey: username
      targetPath: global.email.from
      optional: true
    - kind: Secret
      name: gitlab-smtp
      valuesKey: username
      targetPath: global.email.reply_to
      optional: true
