apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab
  namespace: gitlab
spec:
  interval: 10m
  chart:
    spec:
      chart: gitlab
      version: 9.11.2
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: flux-system
  install:
    createNamespace: false
  values:
    global:
      kas:
        enabled: false
      gitaly:
        enabled: true
      appConfig:
        omniauth:
          enabled: true
          allowSingleSignOn:
            - openid_connect
          blockAutoCreatedUsers: false
          autoLinkUser:
            - openid_connect
          providers:
            - secret: gitlab-authentik
              key: provider
      edition: ce
      hosts:
        domain: cherkaoui.ch
        https: true
        gitlab:
          name: gitlab.cherkaoui.ch
          https: true
        registry:
          name: registry.cherkaoui.ch
          https: true
        minio:
          name: minio.cherkaoui.ch
          https: true
        ssh: "gitlab.cherkaoui.ch"
      ingress:
        enabled: false
        configureCertmanager: false
        tls:
          enabled: false
      smtp:
        enabled: true
        address: smtp.protonmail.ch
        port: 587
        password:
          secret: gitlab-smtp
          key: password
        domain: smtp.protonmail.ch
        authentication: plain
        starttls_auto: true
        openssl_verify_mode: none
      email:
        display_name: Cherkaoui Gitlab
        subject_suffix: ""
      monitoring:
        enabled: true
    gitlab:
      migrations:
        resources:
          requests: {}
      webservice:
        minReplicas: 1
        maxReplicas: 1
        autoscaling:
          enabled: true
      sidekiq:
        minReplicas: 1
        maxReplicas: 1
        autoscaling:
          enabled: true
      gitlab-shell:
        minReplicas: 1
      registry:
        minReplicas: 1
      # Gitaly - fast storage for Git repositories
      gitaly:
        persistence:
          storageClass: fast
          size: 50Gi
    installCertmanager: false
    nginx-ingress:
      enabled: false
    prometheus:
      install: false
    postgresql:
      primary:
        persistence:
          storageClass: fast
          size: 20Gi
    redis:
      master:
        persistence:
          storageClass: fast
          size: 8Gi
    minio:
      persistence:
        storageClass: tank
        size: 50Gi
  valuesFrom:
    - kind: Secret
      name: gitlab-smtp
      valuesKey: username
      targetPath: global.smtp.user_name
      optional: true
    - kind: Secret
      name: gitlab-smtp
      valuesKey: username
      targetPath: global.email.from
      optional: true
    - kind: Secret
      name: gitlab-smtp
      valuesKey: username
      targetPath: global.email.reply_to
      optional: true
