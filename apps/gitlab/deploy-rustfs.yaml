apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs
  namespace: gitlab
  labels:
    app.kubernetes.io/name: rustfs
    app.kubernetes.io/part-of: gitlab
spec:
  replicas: 1
  strategy:
    type: Recreate            # single RWO volume — never run two pods at once
  selector:
    matchLabels:
      app.kubernetes.io/name: rustfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs
        app.kubernetes.io/part-of: gitlab
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001         # makes the ZFS volume writable by the rustfs user
      containers:
        - name: rustfs
          image: rustfs/rustfs:1.0.0-beta.8
          env:
            - name: RUSTFS_VOLUMES
              value: /data/rustfs0
            - name: RUSTFS_ADDRESS
              value: ":9000"
            - name: RUSTFS_CONSOLE_ENABLE
              value: "false"     # internal, unused — reduce surface
          envFrom:
            - secretRef:
                name: rustfs-credentials   # RUSTFS_ACCESS_KEY / RUSTFS_SECRET_KEY (lockbox-managed)
          ports:
            - name: s3
              containerPort: 9000
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rustfs-data
