apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitlab-postgres
  namespace: gitlab
  labels:
    app: gitlab-postgres
spec:
  instances: 1
  enableSuperuserAccess: false
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    storageClass: fast
    size: 20Gi
  # One-time migration: pg_dump/restore the bundled DB into this cluster on bootstrap.
  bootstrap:
    initdb:
      database: gitlabhq_production
      owner: gitlab
      import:
        type: microservice
        databases:
          - gitlabhq_production
        source:
          externalCluster: bundled-gitlab-pg
  externalClusters:
    - name: bundled-gitlab-pg
      connectionParameters:
        host: gitlab-postgresql.gitlab.svc
        port: "5432"
        user: postgres
        dbname: gitlabhq_production
        sslmode: prefer
      password:
        name: gitlab-postgresql-password
        key: postgresql-postgres-password
