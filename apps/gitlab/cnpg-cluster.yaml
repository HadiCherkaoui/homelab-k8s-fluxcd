apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitlab-postgres
  namespace: gitlab
  labels:
    app: gitlab-postgres
spec:
  instances: 1
  enableSuperuserAccess: false
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  storage:
    storageClass: fast
    size: 20Gi
  # DB imported one-time from the bundled gitlab-postgresql on 2026-06-11.
  # Import scaffolding (bootstrap.initdb.import + externalClusters) removed — no longer needed.
  bootstrap:
    initdb:
      database: gitlabhq_production
      owner: gitlab
