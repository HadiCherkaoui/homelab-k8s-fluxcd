apiVersion: v1
kind: Service
metadata:
  name: gitlab-elasticsearch
  namespace: gitlab
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/part-of: gitlab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
