apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 10m
  chart:
    spec:
      chart: immich
      version: 25.28.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    createNamespace: false
  values:
    cnpg:
      main:
        cluster:
          instances: 1
          storage:
            size: 50Gi
            storageClass: fast
          walStorage:
            size: 10Gi
            storageClass: fast
